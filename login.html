
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ورود کاربران</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#1e3c72,#2a5298);
}

.login-box{
width:380px;
background:white;
padding:35px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

.login-box h1{
text-align:center;
margin-bottom:25px;
color:#1e3c72;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:10px;
font-size:15px;
}

button{
width:100%;
padding:12px;
background:#1e3c72;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#2a5298;
}

.back{
display:block;
text-align:center;
margin-top:15px;
text-decoration:none;
color:#1e3c72;
}

</style>
</head>

<body>

<div class="login-box">

<h1>ورود کاربران</h1>

<form>

<input type="text" placeholder="نام کاربری">

<input type="password" placeholder="رمز عبور">

<button type="submit">
ورود به حساب
</button>

</form>

<a href="index.html" class="back">
بازگشت به صفحه اصلی
</a>

</div>

</body>
</html>
